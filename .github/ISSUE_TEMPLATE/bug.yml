name: Bug report
description: Report incorrect routing, installer behavior or lost context.
title: "bug: "
labels: [bug]
body:
  - type: dropdown
    id: agent
    attributes:
      label: Agent
      options: [Codex CLI, Claude Code, Hermes Agent, GG Coder, Other]
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, sanitized config shape and observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I removed keys, tokens, private paths and personal data.
          required: true
